<main class="main">
  <header class="page-header">
    <div>
      <h1 class="page-title">Alerts</h1>
      <p class="page-sub" id="subline">—</p>
    </div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-ghost" id="btnMarkAll">Mark all read</button>
      <button class="btn btn-danger" id="btnClear">Clear all</button>
    </div>
  </header>
  <div class="inventory-toolbar" style="margin-bottom:1.25rem">
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="unread">Unread</button>
      <button class="filter-tab" data-filter="status_change">Status changes</button>
      <button class="filter-tab" data-filter="new_item">New items</button>
    </div>
  </div>
  <div id="notifList"></div>
</main>

<script src="ledgr.js"></script>
<script>
  checkAuth();
  initTheme();
  refreshNavAvatar();
  refreshNavBadge();
  let currentFilter = 'all';
  document.getElementById('filterTabs').addEventListener('click', e => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
  document.getElementById('btnMarkAll').addEventListener('click', () => {
    markAllRead(); refreshNavBadge(); render();
    showToast('All alerts marked as read');
  });
  document.getElementById('btnClear').addEventListener('click', () => {
    if (!getNotifications().length) return;
    showDialog('Clear Alerts', 'Remove all alerts? This cannot be undone.', () => {
      clearNotifications(); refreshNavBadge(); render();
      showToast('All alerts cleared');
    });
  });
  function filtered() {
    const notifs = getNotifications();
    if (currentFilter === 'unread')        return notifs.filter(n => !n.read);
    if (currentFilter === 'status_change') return notifs.filter(n => n.type === 'status_change');
    if (currentFilter === 'new_item')      return notifs.filter(n => n.type === 'new_item');
    return notifs;
  }
  function render() {
    const notifs = filtered();
    const unread = getNotifications().filter(n => !n.read).length;
    const total  = getNotifications().length;
    document.getElementById('subline').textContent = `${total} alert${total !== 1 ? 's' : ''} · ${unread} unread`;
    const el = document.getElementById('notifList');
    if (!notifs.length) {
      el.innerHTML = `<div class="empty"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg><h3>No alerts</h3><p>Alerts appear here when item statuses change or new items are added.</p></div>`;
      return;
    }
    el.innerHTML = `<div class="notif-list fade-in">${notifs.map(n => `
      <div class="notif-item${n.read ? ' read' : ' unread'}" data-id="${esc(n.id)}" onclick="readNotif('${esc(n.id)}')">
        <div class="notif-dot"></div>
        <div class="notif-content">
          <div class="notif-msg">${esc(n.message)}</div>
          <div class="notif-meta">
            <span class="notif-time">${timeAgo(n.createdAt)}</span>
            <span class="notif-type type-${n.type}">${n.type === 'status_change' ? 'Status' : n.type === 'new_item' ? 'New Item' : 'System'}</span>
          </div>
        </div>
        ${n.itemId ? `<a href="inventory.html?id=${esc(n.itemId)}" class="btn btn-xs btn-ghost" onclick="event.stopPropagation()" title="View item in inventory">View</a>` : ''}
      </div>`).join('')}
    </div>`;
  }
  function readNotif(id) {
    markRead(id);
    const el = document.querySelector(`.notif-item[data-id="${id}"]`);
    if (el) { el.classList.remove('unread'); el.classList.add('read'); }
    refreshNavBadge();
    const unread = getNotifications().filter(n => !n.read).length;
    const total  = getNotifications().length;
    document.getElementById('subline').textContent = `${total} alert${total !== 1 ? 's' : ''} · ${unread} unread`;
  }
  render();
</script>
</body>
</html>
