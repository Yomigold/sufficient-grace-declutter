<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledgr — Add Item</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <span class="nav-logo">LEDGR</span>
    <span class="nav-sub">Inventory</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">
      <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/></svg>
      Dashboard
    </a>
    <a href="inventory.html" class="nav-link">
      <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      Inventory
    </a>
    <a href="notifications.html" class="nav-link">
      <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
      Alerts
      <span class="notif-badge" hidden></span>
    </a>
    <button class="btn-logout" onclick="logout()" title="Sign out">
      <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
      <span>Sign out</span>
    </button>
  </div>
</nav>

<main class="main">
  <header class="page-header">
    <div>
      <h1 class="page-title" id="pageTitle">Add Item</h1>
      <p class="page-sub">Fill in the details below to track your inventory item</p>
    </div>
    <a href="inventory.html" class="btn btn-ghost">← Back to Inventory</a>
  </header>

  <div class="form-container">
    <form class="form-card" id="itemForm" novalidate>
      <div class="form-grid">
        <div class="form-group span2">
          <label class="form-label" for="name">Item Name *</label>
          <input class="form-control" type="text" id="name" placeholder="e.g. Nike Air Jordan 4 Retro" required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="status">Status</label>
          <select class="form-control" id="status">
            <option value="listed">Listed</option>
            <option value="available">Available</option>
            <option value="sold">Sold</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="sellerRef">Seller Ref *</label>
          <input class="form-control" type="text" id="sellerRef" placeholder="e.g. SELL-001" required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="buyerRef">Buyer Ref</label>
          <input class="form-control" type="text" id="buyerRef" placeholder="e.g. BUY-042 (optional)" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="sellersAmount">Seller's Amount *</label>
          <div class="amount-wrap">
            <select class="form-control" id="sellersCurrency">
              <option value="NGN">₦ NGN</option>
              <option value="SGD">S$</option>
              <option value="USD">US$</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
              <option value="AUD">A$</option>
              <option value="HKD">HK$</option>
              <option value="CNY">CN¥</option>
            </select>
            <input class="form-control" type="number" id="sellersAmount" placeholder="0.00" min="0" step="0.01" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="costPrice">Cost Price (what you paid)</label>
          <div class="amount-wrap">
            <span class="form-control" style="width:auto;min-width:60px;background:rgba(255,255,255,.03);display:flex;align-items:center;border-radius:var(--rsm) 0 0 var(--rsm);border-right:none;color:var(--text2);font-size:.8rem" id="costCurrencyLabel">₦</span>
            <input class="form-control" type="number" id="costPrice" placeholder="0.00" min="0" step="0.01" style="border-radius:0 var(--rsm) var(--rsm) 0" oninput="updatePnL()">
          </div>
        </div>
        <div class="form-group span2" id="pnlRow" style="display:none">
          <div style="background:var(--gold-dim);border:1px solid rgba(201,168,76,.25);border-radius:var(--rsm);padding:.6rem .9rem;font-size:.85rem;display:flex;gap:1.5rem;flex-wrap:wrap">
            <span id="pnlProfit" style="font-weight:700;color:var(--gold)"></span>
            <span id="pnlMarginPct" style="color:var(--text2)"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="buyerPhone">Buyer Phone / WhatsApp</label>
          <input class="form-control" type="tel" id="buyerPhone" placeholder="+234 800 000 0000 (optional)" autocomplete="off">
        </div>
        <div class="form-group" id="paymentStatusGroup">
          <label class="form-label" for="paymentStatus">Payment Status</label>
          <select class="form-control" id="paymentStatus">
            <option value="pending">Pending</option>
            <option value="partial">Part-paid</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div class="form-group span2">
          <label class="form-label">Notification Trigger</label>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Status change alerts</div>
              <div class="toggle-desc">Get an alert whenever this item's status is updated</div>
            </div>
            <label class="switch">
              <input type="checkbox" id="notifyOnChange" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="form-group span2">
          <label class="form-label" for="notes">Notes</label>
          <textarea class="form-control" id="notes" placeholder="Condition, size, colour, provenance…"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <a href="inventory.html" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">Save Item</button>
      </div>
    </form>
  </div>
</main>

<script src="ledgr.js"></script>
<script>
  checkAuth();
  refreshNavBadge();
  const params   = new URLSearchParams(location.search);
  const editId   = params.get('id');
  const editItem = editId ? getItem(editId) : null;

  function updatePnL() {
    const sale     = parseFloat(document.getElementById('sellersAmount').value) || 0;
    const cost     = parseFloat(document.getElementById('costPrice').value) || 0;
    const row      = document.getElementById('pnlRow');
    if (!sale || !cost) { row.style.display = 'none'; return; }
    const profit   = sale - cost;
    const pct      = cost > 0 ? ((profit / cost) * 100).toFixed(1) : 0;
    const currency = document.getElementById('sellersCurrency').value;
    const sym      = { SGD:'S$', NGN:'₦', USD:'US$', EUR:'€', GBP:'£', JPY:'¥', AUD:'A$', HKD:'HK$', CNY:'CN¥' }[currency] || currency;
    row.style.display = '';
    document.getElementById('pnlProfit').textContent  = `Profit: ${profit >= 0 ? '+' : ''}${sym}${Math.abs(profit).toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})}`;
    document.getElementById('pnlMarginPct').textContent = `Margin: ${pct}%`;
    const costLabel = document.getElementById('costCurrencyLabel');
    if (costLabel) costLabel.textContent = sym;
  }

  // Sync currency symbol on cost price label
  document.getElementById('sellersCurrency').addEventListener('change', updatePnL);
  document.getElementById('sellersAmount').addEventListener('input', updatePnL);

  if (editItem) {
    document.getElementById('pageTitle').textContent = 'Edit Item';
    document.getElementById('submitBtn').textContent = 'Update Item';
    document.title = 'Ledgr — Edit Item';
    document.getElementById('name').value             = editItem.name || '';
    document.getElementById('status').value           = editItem.status || 'listed';
    document.getElementById('sellerRef').value        = editItem.sellerRef || '';
    document.getElementById('buyerRef').value         = editItem.buyerRef || '';
    document.getElementById('sellersCurrency').value  = editItem.sellersCurrency || 'NGN';
    document.getElementById('sellersAmount').value    = editItem.sellersAmount || '';
    document.getElementById('costPrice').value        = editItem.costPrice || '';
    document.getElementById('buyerPhone').value       = editItem.buyerPhone || '';
    document.getElementById('paymentStatus').value    = editItem.paymentStatus || 'pending';
    document.getElementById('notifyOnChange').checked = !!editItem.notifyOnChange;
    document.getElementById('notes').value            = editItem.notes || '';
    updatePnL();
  }
  document.getElementById('itemForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const sellerRef = document.getElementById('sellerRef').value.trim();
    const sellersAmount = parseFloat(document.getElementById('sellersAmount').value);
    if (!name)        { showToast('Item name is required', 'error'); return; }
    if (!sellerRef)   { showToast('Seller ref is required', 'error'); return; }
    if (isNaN(sellersAmount) || sellersAmount < 0) { showToast('Enter a valid seller amount', 'error'); return; }
    const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
    const status    = document.getElementById('status').value;
    const sale      = sellersAmount;
    const margin    = costPrice > 0 ? sale - costPrice : sale * 0.10;
    const data = {
      id: editId || undefined,
      name,
      status,
      sellerRef,
      buyerRef:        document.getElementById('buyerRef').value.trim(),
      buyerPhone:      document.getElementById('buyerPhone').value.trim(),
      paymentStatus:   status === 'sold' ? document.getElementById('paymentStatus').value : 'pending',
      sellersCurrency: document.getElementById('sellersCurrency').value,
      sellersAmount,
      costPrice,
      sgdMargin:       status === 'sold' ? margin : 0,
      notifyOnChange:  document.getElementById('notifyOnChange').checked,
      notes:           document.getElementById('notes').value.trim(),
    };
    saveItem(data);
    showToast(editId ? 'Item updated' : 'Item added', 'success');
    setTimeout(() => location.href = 'inventory.html', 600);
  });
</script>
</body>
</html>
